<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>7-Inch Dash Console</title>

<style>
:root {
    --bg-main: #070a10;
    --card-bg: #101520;
    --accent-blue: #00e5ff;
    --accent-green: #39ff14;
    --accent-red: #ff0055;
    --text-primary: #ffffff;
    --text-secondary: #7e8b9b;
}

body {
    margin: 0;
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: 'Segoe UI', Roboto, sans-serif;
    padding: 8px;
    box-sizing: border-box;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    display: grid;
    grid-template-columns: 28% 44% 28%;
    grid-template-rows: 49% 49%;
    gap: 8px;
    width: 100%;
    height: 100%;
    max-height: 600px;
}

.card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.02);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    overflow: hidden;
}

/* Widescreen Navigation: Spans both rows in the middle column */
.nav-card {
    grid-column: 2;
    grid-row: 1 / span 2;
    padding: 0;
    position: relative;
    height: 100%;
}

.map-wrapper {
    width: 100%;
    height: 100%;
}

.map {
    width: 100%;
    height: 100%;
    border: 0;
}

.label {
    color: var(--text-secondary);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
}

/* System Chronometer Graphics */
.clock-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    padding-bottom: 6px;
    margin-top: 2px;
}

.time-display {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #ffffff;
    letter-spacing: -0.5px;
}

.date-display {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent-blue);
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.weather-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 4px;
}

.weather-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 16px;
    font-weight: 700;
}

.location-info {
    text-align: right;
    font-size: 10px;
    color: var(--text-secondary);
}

/* Compact Mini Calendar Engine */
.calendar-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
    justify-content: center;
}

.calendar-header {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-primary);
    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
    font-size: 9px;
}

.cal-day-head {
    color: var(--text-secondary);
    font-weight: 700;
    padding-bottom: 2px;
}

.cal-day {
    color: rgba(255, 255, 255, 0.7);
    padding: 3px 0;
    border-radius: 4px;
    font-weight: 500;
}

.cal-day.today {
    background: rgba(0, 229, 255, 0.15);
    color: var(--accent-blue);
    font-weight: 800;
    box-shadow: inset 0 0 0 1px rgba(0, 229, 255, 0.4);
}

.cal-day.empty {
    opacity: 0;
}

/* Audio Interfacing Modules */
.media-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.media-meta h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
}

.media-meta p {
    margin: 1px 0 0 0;
    font-size: 10px;
    color: var(--accent-blue);
}

.live-indicator {
    background: rgba(57, 255, 20, 0.1);
    border: 1px solid var(--accent-green);
    color: var(--accent-green);
    font-size: 8px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 10px;
}

.controls-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: auto;
}

.vol-container {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-grow: 1;
    background: rgba(255,255,255,0.03);
    padding: 4px 8px;
    border-radius: 8px;
}

.vol-slider {
    flex-grow: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    outline: none;
}

.vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent-blue);
    cursor: pointer;
}

.video-frame-container {
    width: 100%;
    height: 60px;
    border-radius: 8px;
    overflow: hidden;
    margin: 2px 0;
    background: #000;
}

.video-frame-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

.ctrl-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.ctrl-btn:active {
    background: var(--accent-blue);
    color: #000;
}
</style>
</head>

<body>

<div class="container">

    <!-- Column 1, Row 1: Environment & Time Node -->
    <div class="card">
        <div>
            <div class="label">System Clock</div>
            <div class="clock-container">
                <div class="time-display" id="time-display">00:00:00</div>
                <div class="date-display" id="calendar-display">SAT, MAY 16</div>
            </div>
            <div class="weather-container">
                <div class="weather-info">
                    <span>☀️</span><span>26°C</span>
                </div>
                <div class="location-info">
                    <div>Tirana, ALB</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Column 1, Row 2: Compact Calendar -->
    <div class="card">
        <div class="calendar-wrapper">
            <div class="calendar-header" id="cal-month-year">May 2026</div>
            <div class="calendar-grid" id="calendar-grid-box"></div>
        </div>
    </div>

    <!-- Column 2 (Expanded): Dedicated Widescreen Map Core -->
    <div class="card nav-card">
        <div class="map-wrapper">
            <iframe
                class="map"
                id="dashboard-map"
                src="https://maps.google.com/maps?q=Tirana&t=&z=14&ie=UTF8&iwloc=&output=embed">
            </iframe>
        </div>
    </div>

    <!-- Column 3, Row 1: Radio Terminal -->
    <div class="card">
        <div>
            <div class="label">Radio Terminal</div>
            <div class="media-header">
                <div class="media-meta">
                    <h2 id="radio-station">Top Albania Radio</h2>
                    <p id="radio-genre">Pop / Hits</p>
                </div>
                <div class="live-indicator">LIVE</div>
            </div>
        </div>
        <div class="controls-row">
            <button class="ctrl-btn" onclick="prevRadio()">⏴</button>
            <button class="ctrl-btn" id="radio-play-btn" onclick="toggleRadio()">▶</button>
            <button class="ctrl-btn" onclick="nextRadio()">⏵</button>
            <div class="vol-container">
                <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
            </div>
        </div>
    </div>

    <!-- Column 3, Row 2: Media Player -->
    <div class="card">
        <div>
            <div class="label">Media Center</div>
            <div class="media-header">
                <div class="media-meta">
                    <h2 id="video-title">Lofi Hip Hop</h2>
                    <p id="video-genre">Chilled Beats</p>
                </div>
            </div>
        </div>
        <div class="video-frame-container">
            <iframe id="yt-player" src="https://www.youtube.com/embed/jfKfPfyJRdk?enablejsapi=1&rel=0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="controls-row" style="justify-content: flex-start; gap: 8px;">
            <button class="ctrl-btn" onclick="prevVideo()">⏴</button>
            <button class="ctrl-btn" onclick="nextVideo()">⏵</button>
        </div>
    </div>

</div>

<script>
// Time & String Date Logic Pipeline
function updateClock() {
    const now = new Date();
    let hours = String(now.getHours()).padStart(2, '0');
    let minutes = String(now.getMinutes()).padStart(2, '0');
    let seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById("time-display").innerText = `${hours}:${minutes}:${seconds}`;
    
    const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
    document.getElementById("calendar-display").innerText = now.toLocaleDateString('en-US', dateOptions).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

// Dynamic Calendar Engine Setup
function generateMiniCalendar() {
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth();
    const todayDate = now.getDate();
    
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById("cal-month-year").innerText = `${monthNames[currentMonth]} ${currentYear}`;
    
    const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
    const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    const gridBox = document.getElementById("calendar-grid-box");
    gridBox.innerHTML = '';
    
    const daysOfWeek = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    daysOfWeek.forEach(day => {
        const headCell = document.createElement('div');
        headCell.className = 'cal-day-head';
        headCell.innerText = day;
        gridBox.appendChild(headCell);
    });
    
    for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'cal-day empty';
        gridBox.appendChild(emptyCell);
    }
    
    for (let day = 1; day <= totalDays; day++) {
        const dayCell = document.createElement('div');
        dayCell.className = 'cal-day';
        dayCell.innerText = day;
        if (day === todayDate) dayCell.className += ' today';
        gridBox.appendChild(dayCell);
    }
}
generateMiniCalendar();

// Device Location Tracker Hook (Still runs quietly in background to auto-recenter the widescreen map view)
const mapElement = document.getElementById("dashboard-map");

if ("geolocation" in navigator) {
    navigator.geolocation.getCurrentPosition(
        (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            mapElement.src = `https://maps.google.com/maps?q=${lat},${lon}&z=15&ie=UTF8&iwloc=&output=embed`;
        },
        (error) => console.log("Map geo link secure or local-file restricted. Defaulting center."),
        { enableHighAccuracy: false, timeout: 5000 }
    );
}

// Global Audio Architecture (Using robust cross-origin relays)
const radioStations = [
    { name: "Top Albania Radio", genre: "Pop / Hits", url: "https://pub1.mediastreaming.it:9010/stream" },
    { name: "Radio Shqip", genre: "Folk / Pop Shqip", url: "https://stream.radiotshqip.com/stream" },
    { name: "Radio Alana", genre: "Hits Mix", url: "https://cast1.asg.com.al/proxy/radioalana/stream" },
    { name: "Capital FM Shqip", genre: "Urban / Pop", url: "https://live.capitalfm.al/radio/8000/radio.mp3" }
];

let currentRadioIndex = 0;
let isRadioPlaying = false;
let audioStream = new Audio();
audioStream.volume = 0.5;

const radioStationTxt = document.getElementById("radio-station");
const radioGenreTxt = document.getElementById("radio-genre");
const radioPlayBtn = document.getElementById("radio-play-btn");

function updateRadioStream() {
    const target = radioStations[currentRadioIndex];
    radioStationTxt.innerText = target.name;
    radioGenreTxt.innerText = target.genre;
    
    audioStream.pause();
    audioStream.src = target.url;
    audioStream.load();
    
    if (isRadioPlaying) {
        let playPromise = audioStream.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => console.log("Stream access restriction:", error));
        }
    }
}

function toggleRadio() {
    if (!audioStream.src) audioStream.src = radioStations[currentRadioIndex].url;
    
    if (isRadioPlaying) {
        audioStream.pause();
        radioPlayBtn.innerText = "▶";
    } else {
        audioStream.load();
        let playPromise = audioStream.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                radioPlayBtn.innerText = "⏸";
            }).catch(error => console.log("Interaction barrier reached:", error));
        }
    }
    isRadioPlaying = !isRadioPlaying;
}

function nextRadio() { currentRadioIndex = (currentRadioIndex + 1) % radioStations.length; updateRadioStream(); }
function prevRadio() { currentRadioIndex = (currentRadioIndex - 1 + radioStations.length) % radioStations.length; updateRadioStream(); }
function changeVolume(vol) { audioStream.volume = vol; }

// YouTube Embed Stream Array 
const ytPlaylist = [
    { id: "jfKfPfyJRdk", title: "Lofi Hip Hop", genre: "Chilled Beats" },
    { id: "4xDzrJKXOOY", title: "Synthwave Mix", genre: "Night Electronic" }
];
let currentVideoIndex = 0;
const ytPlayer = document.getElementById("yt-player");
const videoTitle = document.getElementById("video-title");
const videoGenre = document.getElementById("video-genre");

function updateVideoUI() {
    const video = ytPlaylist[currentVideoIndex];
    ytPlayer.src = `https://www.youtube.com/embed/${video.id}?enablejsapi=1&rel=0&autoplay=1`;
    videoTitle.innerText = video.title;
    videoGenre.innerText = video.genre;
}
function nextVideo() { currentVideoIndex = (currentVideoIndex + 1) % ytPlaylist.length; updateVideoUI(); }
function prevVideo() { currentVideoIndex = (currentVideoIndex - 1 + ytPlaylist.length) % ytPlaylist.length; updateVideoUI(); }
</script>

</body>
</html>
